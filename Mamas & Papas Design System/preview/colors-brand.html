<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-ExtraLight.ttf') format('truetype'); font-weight: 200; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
</style>
<style>
  body { margin: 0; background: #F8F8F8; font-family: var(--font-sans); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .row-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #575656; margin-bottom: 6px; }
  .row { display: flex; gap: 0; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-md); }
  .swatch { flex: 1; padding: 18px 12px 12px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 90px; }
  .swatch-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 2px; }
  .swatch-hex { font-size: 10px; opacity: 0.7; font-family: monospace; }
  .swatch-note { font-size: 9px; margin-top: 2px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .light .swatch-label, .light .swatch-hex, .light .swatch-note { color: #323232; }
  .dark .swatch-label, .dark .swatch-hex, .dark .swatch-note { color: rgba(255,255,255,0.9); }
</style></head>
<body>
  <div class="row-label">60% — Dominant backgrounds</div>
  <div class="row">
    <div class="swatch light" style="background:#FFFFFF; border: 1px solid #E8E8E8">
      <div class="swatch-label">White</div><div class="swatch-hex">#FFFFFF</div><div class="swatch-note" style="color:#198669">60%</div>
    </div>
    <div class="swatch light" style="background:#F8F8F8">
      <div class="swatch-label">Grey</div><div class="swatch-hex">#F8F8F8</div>
    </div>
    <div class="swatch light" style="background:#F8F6F0">
      <div class="swatch-label">Cream</div><div class="swatch-hex">#F8F6F0</div>
    </div>
  </div>
  <div class="row-label" style="margin-top:4px">30% — Secondary surfaces</div>
  <div class="row">
    <div class="swatch light" style="background:#DFEBEB">
      <div class="swatch-label">Blue Grey</div><div class="swatch-hex">#DFEBEB</div><div class="swatch-note" style="color:#198669">30%</div>
    </div>
    <div class="swatch light" style="background:#D1D1D1">
      <div class="swatch-label">Soft Grey</div><div class="swatch-hex">#D1D1D1</div>
    </div>
  </div>
  <div class="row-label" style="margin-top:4px">10% — Accent</div>
  <div class="row">
    <div class="swatch dark" style="background:#198669">
      <div class="swatch-label">Primary / Teal ★</div><div class="swatch-hex">#198669</div><div class="swatch-note">10% — CTAs</div>
    </div>
    <div class="swatch dark" style="background:#323232">
      <div class="swatch-label">Charcoal</div><div class="swatch-hex">#323232</div><div class="swatch-note">Text & headings</div>
    </div>
    <div class="swatch dark" style="background:#575656">
      <div class="swatch-label">Logo Grey</div><div class="swatch-hex">#575656</div><div class="swatch-note">Secondary text</div>
    </div>
  </div>
</body></html>
