<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-ExtraLight.ttf') format('truetype'); font-weight: 200; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
</style>
<style>
  body { margin: 0; background: var(--mp-white); font-family: var(--font-sans); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch { flex: 1; padding: 16px 12px 12px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 72px; }
  .swatch-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; color: #2C2825; }
  .swatch-hex { font-size: 10px; opacity: 0.6; font-family: monospace; color: #2C2825; }
  .row-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #7A736D; margin-bottom: 4px; }
</style>
</head>
<body>
  <div>
    <div class="row-label">Blush</div>
    <div class="row">
      <div class="swatch" style="background:#EDAFA0"><div class="swatch-label">500</div><div class="swatch-hex">#EDAFA0</div></div>
      <div class="swatch" style="background:#F2C5B8"><div class="swatch-label">400</div><div class="swatch-hex">#F2C5B8</div></div>
      <div class="swatch" style="background:#F5D5CC"><div class="swatch-label">300</div><div class="swatch-hex">#F5D5CC</div></div>
      <div class="swatch" style="background:#F8E4DE"><div class="swatch-label">200</div><div class="swatch-hex">#F8E4DE</div></div>
      <div class="swatch" style="background:#FBF0ED"><div class="swatch-label">100</div><div class="swatch-hex">#FBF0ED</div></div>
    </div>
  </div>
  <div>
    <div class="row-label">Sage</div>
    <div class="row">
      <div class="swatch" style="background:#8FA870"><div class="swatch-label">500</div><div class="swatch-hex">#8FA870</div></div>
      <div class="swatch" style="background:#AABF90"><div class="swatch-label">400</div><div class="swatch-hex">#AABF90</div></div>
      <div class="swatch" style="background:#C3D3AE"><div class="swatch-label">300</div><div class="swatch-hex">#C3D3AE</div></div>
      <div class="swatch" style="background:#DAE5CC"><div class="swatch-label">200</div><div class="swatch-hex">#DAE5CC</div></div>
      <div class="swatch" style="background:#EBF1E2"><div class="swatch-label">100</div><div class="swatch-hex">#EBF1E2</div></div>
    </div>
  </div>
  <div>
    <div class="row-label">Cream</div>
    <div class="row">
      <div class="swatch" style="background:#E8DDD0"><div class="swatch-label">500</div><div class="swatch-hex">#E8DDD0</div></div>
      <div class="swatch" style="background:#EFE6DC"><div class="swatch-label">400</div><div class="swatch-hex">#EFE6DC</div></div>
      <div class="swatch" style="background:#F4EDE6"><div class="swatch-label">300</div><div class="swatch-hex">#F4EDE6</div></div>
      <div class="swatch" style="background:#F8F4F0"><div class="swatch-label">200</div><div class="swatch-hex">#F8F4F0</div></div>
      <div class="swatch" style="background:#FBFAF7"><div class="swatch-label">100</div><div class="swatch-hex">#FBFAF7</div></div>
    </div>
  </div>
</body></html>
