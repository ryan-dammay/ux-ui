<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-ExtraLight.ttf') format('truetype'); font-weight: 200; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
</style>
<style>
  body { margin: 0; background: var(--mp-white); font-family: var(--font-sans); display: flex; align-items: center; padding: 20px; gap: 0; }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); flex: 1; }
  .swatch { flex: 1; padding: 20px 14px 14px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 110px; }
  .swatch-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  .swatch-hex { font-size: 11px; opacity: 0.7; font-family: monospace; }
  .light .swatch-label, .light .swatch-hex { color: #2C2825; }
  .dark .swatch-label, .dark .swatch-hex { color: rgba(255,255,255,0.9); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch dark" style="background:#2D4200"><div class="swatch-label">Green 900</div><div class="swatch-hex">#2D4200</div></div>
  <div class="swatch dark" style="background:#3D5A00"><div class="swatch-label">Green 800</div><div class="swatch-hex">#3D5A00</div></div>
  <div class="swatch dark" style="background:#5A8000"><div class="swatch-label">Green 700</div><div class="swatch-hex">#5A8000</div></div>
  <div class="swatch dark" style="background:#72A000"><div class="swatch-label">Green 600</div><div class="swatch-hex">#72A000</div></div>
  <div class="swatch light" style="background:#8CB300; outline: 3px solid #8CB300; outline-offset: -3px;"><div class="swatch-label">Green 500 ★</div><div class="swatch-hex">#8CB300</div></div>
  <div class="swatch light" style="background:#A5CC1A"><div class="swatch-label">Green 400</div><div class="swatch-hex">#A5CC1A</div></div>
  <div class="swatch light" style="background:#C0DD55"><div class="swatch-label">Green 300</div><div class="swatch-hex">#C0DD55</div></div>
  <div class="swatch light" style="background:#DAEE99"><div class="swatch-label">Green 200</div><div class="swatch-hex">#DAEE99</div></div>
  <div class="swatch light" style="background:#EDF6CC"><div class="swatch-label">Green 100</div><div class="swatch-hex">#EDF6CC</div></div>
</div>
</body></html>
