<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-ExtraLight.ttf') format('truetype'); font-weight: 200; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }
@font-face { font-family: 'Poppins'; src: url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
  body { margin: 0; background: #F0EEEB; font-family: 'Poppins', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #575656; margin-bottom: 10px; }
  .logo-block { padding: 28px 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .info { background: #DFEBEB; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #175A7B; font-weight: 300; line-height: 1.6; }
  .info strong { font-weight: 600; }
</style></head>
<body>
  <div class="row">
    <div>
      <div class="label">On White</div>
      <div class="logo-block" style="background:white; box-shadow: 0 2px 8px rgba(0,0,0,.07)">
        <img src="../assets/logo.svg" height="42" alt="Mamas & Papas logo">
      </div>
    </div>
    <div>
      <div class="label">On Dark / Charcoal</div>
      <div class="logo-block" style="background:#323232; border-radius:8px">
        <img src="../assets/logo-white.svg" height="42" alt="Mamas & Papas logo white">
      </div>
    </div>
    <div>
      <div class="label">On Cream</div>
      <div class="logo-block" style="background:#F8F6F0; border: 1px solid #E8E3DA; border-radius:8px">
        <img src="../assets/logo.svg" height="42" alt="Mamas & Papas logo">
      </div>
    </div>
    <div>
      <div class="label">On Blue Grey</div>
      <div class="logo-block" style="background:#DFEBEB; border-radius:8px">
        <img src="../assets/logo.svg" height="42" alt="Mamas & Papas logo">
      </div>
    </div>
  </div>
  <div class="info">
    <strong>Source:</strong> Official brand SVG — 113×42px viewBox · Charcoal <strong>#323232</strong> wordmark · No separate teal ampersand in this variant (full custom letterform set)
  </div>
</body></html>
