<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&P — Responsive Spacing & Typography Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Cousine:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:     #198669;
    --teal-lt:  rgba(25,134,105,.08);
    --coral:    #C4574A;
    --charcoal: #323232;
    --mid:      #575656;
    --muted:    #878686;
    --border:   #D1D1D1;
    --cream:    #F8F6F0;
    --grey:     #F8F8F8;
    --white:    #FFFFFF;
    --navy:     #2C3E5A;

    /* Skeleton shades */
    --sk-1: #E8EDF0;
    --sk-2: #D1DBE0;
    --sk-3: #C4D0D6;
    --sk-teal: rgba(25,134,105,.12);
    --sk-teal-d: rgba(25,134,105,.22);
  }

  html, body { height: 100%; }
  body { font-family: 'Poppins', sans-serif; background: #1A1F24; color: var(--charcoal); display: flex; flex-direction: column; }

  /* ── Top toolbar ── */
  .toolbar {
    background: var(--charcoal); padding: 14px 24px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .toolbar-brand { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: .5px; flex-shrink: 0; }
  .toolbar-brand span { color: var(--teal); }

  .bp-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .bp-tab {
    padding: 5px 14px; border-radius: 99px; font-size: 11px; font-weight: 700;
    background: rgba(255,255,255,.07); color: rgba(255,255,255,.5);
    cursor: pointer; border: 1px solid transparent; transition: all .15s;
    font-family: 'Poppins', sans-serif; letter-spacing: .3px;
  }
  .bp-tab:hover { background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); }
  .bp-tab.active { background: var(--teal); color: #fff; border-color: var(--teal); }

  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .toggle-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,.07); color: rgba(255,255,255,.6);
    cursor: pointer; border: 1px solid rgba(255,255,255,.1); transition: all .15s;
    font-family: 'Poppins', sans-serif;
  }
  .toggle-btn.on { background: rgba(25,134,105,.2); color: #4ecba4; border-color: rgba(25,134,105,.3); }

  /* ── Stage ── */
  .stage {
    flex: 1; display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 24px; overflow: auto; min-height: 0;
  }

  /* ── Viewport frame ── */
  .vp-wrap {
    position: relative; transition: width .3s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
  }
  .vp-label {
    text-align: center; font-size: 10px; font-family: 'Cousine', monospace;
    color: rgba(255,255,255,.3); margin-bottom: 8px; letter-spacing: .5px;
  }
  .vp-frame {
    background: var(--white); border-radius: 8px;
    overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    position: relative;
  }

  /* ── Skeleton layout ── */
  .sk-page { transition: padding .3s; }

  /* Nav */
  .sk-nav {
    background: var(--white); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    transition: padding .3s, height .3s;
  }
  .sk-nav-logo { background: var(--sk-teal-d); border-radius: 4px; transition: all .3s; }
  .sk-nav-links { display: flex; gap: 10px; }
  .sk-nav-link { background: var(--sk-1); border-radius: 3px; transition: all .3s; }
  .sk-nav-icons { display: flex; gap: 8px; }
  .sk-nav-icon { background: var(--sk-2); border-radius: 50%; transition: all .3s; }

  /* Hero */
  .sk-hero {
    background: linear-gradient(135deg, var(--sk-teal) 0%, rgba(44,62,90,.1) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    transition: padding .3s, height .3s, gap .3s;
  }
  .sk-hero-eyebrow { background: var(--sk-teal-d); border-radius: 3px; transition: all .3s; }
  .sk-hero-h1 { background: rgba(25,134,105,.3); border-radius: 4px; transition: all .3s; }
  .sk-hero-h1-2 { background: rgba(25,134,105,.2); border-radius: 4px; transition: all .3s; }
  .sk-hero-body { background: var(--sk-2); border-radius: 3px; transition: all .3s; }
  .sk-hero-body-2 { background: var(--sk-1); border-radius: 3px; transition: all .3s; }
  .sk-hero-btn { background: var(--teal); border-radius: 4px; transition: all .3s; }
  .sk-hero-btn-2 { background: var(--sk-2); border-radius: 4px; border: 1.5px solid var(--border); transition: all .3s; }
  .sk-hero-btns { display: flex; transition: gap .3s; }

  /* Section */
  .sk-section { transition: padding .3s; }
  .sk-section-label { background: var(--sk-teal-d); border-radius: 3px; transition: all .3s; }
  .sk-section-title { background: var(--sk-3); border-radius: 4px; transition: all .3s; }
  .sk-section-sub { background: var(--sk-1); border-radius: 3px; transition: all .3s; }

  /* Cards grid */
  .sk-grid { display: grid; transition: gap .3s, grid-template-columns .3s; }
  .sk-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: all .3s; }
  .sk-card-img { background: var(--sk-1); transition: height .3s; }
  .sk-card-body { transition: padding .3s; display: flex; flex-direction: column; }
  .sk-card-badge { background: var(--sk-teal-d); border-radius: 99px; transition: all .3s; }
  .sk-card-title { background: var(--sk-3); border-radius: 3px; transition: all .3s; }
  .sk-card-price { background: var(--sk-2); border-radius: 3px; transition: all .3s; }
  .sk-card-btn { background: var(--sk-teal); border-radius: 4px; transition: all .3s; }

  /* Feature row */
  .sk-features { display: grid; transition: gap .3s, grid-template-columns .3s; }
  .sk-feat { background: var(--sk-1); border-radius: 8px; transition: padding .3s, all .3s; display: flex; flex-direction: column; }
  .sk-feat-icon { background: var(--sk-teal-d); border-radius: 6px; transition: all .3s; }
  .sk-feat-title { background: var(--sk-3); border-radius: 3px; transition: all .3s; }
  .sk-feat-body { background: var(--sk-2); border-radius: 3px; transition: all .3s; }

  /* Promo banner */
  .sk-promo {
    background: linear-gradient(135deg, var(--navy) 0%, var(--coral) 100%);
    border-radius: 8px; display: flex; flex-direction: column;
    transition: padding .3s, gap .3s;
  }
  .sk-promo-title { background: rgba(255,255,255,.4); border-radius: 4px; transition: all .3s; }
  .sk-promo-body  { background: rgba(255,255,255,.2); border-radius: 3px; transition: all .3s; }
  .sk-promo-btn   { background: var(--teal); border-radius: 4px; transition: all .3s; }

  /* Footer */
  .sk-footer {
    background: var(--charcoal);
    display: grid; transition: padding .3s, gap .3s, grid-template-columns .3s;
  }
  .sk-footer-col { display: flex; flex-direction: column; gap: 6px; }
  .sk-footer-title { background: rgba(255,255,255,.3); border-radius: 3px; }
  .sk-footer-link { background: rgba(255,255,255,.12); border-radius: 3px; }

  /* ── Annotations ── */
  .annots-on .sp-annot { display: flex !important; }

  /* Spacing annotation overlays */
  .sp-annot {
    position: absolute; pointer-events: none;
    display: none; align-items: center; justify-content: center; z-index: 20;
  }

  /* Horizontal margin ruler */
  .ruler-h {
    position: absolute; pointer-events: none; display: none;
    z-index: 20; align-items: center;
  }
  .annots-on .ruler-h { display: flex !important; }
  .ruler-v {
    position: absolute; pointer-events: none; display: none;
    z-index: 20; flex-direction: column; align-items: center;
  }
  .annots-on .ruler-v { display: flex !important; }

  .ruler-line-h { height: 1px; background: #F59E2B; flex: 1; }
  .ruler-line-v { width: 1px; background: #F59E2B; flex: 1; }
  .ruler-cap { background: #F59E2B; }
  .ruler-cap-h { width: 1px; height: 6px; }
  .ruler-cap-v { height: 1px; width: 6px; }
  .ruler-badge {
    background: #F59E2B; color: #1A1F24;
    font-family: 'Cousine', monospace; font-size: 8.5px; font-weight: 700;
    padding: 2px 5px; border-radius: 3px; white-space: nowrap;
    position: absolute; transform: translateX(-50%); left: 50%;
    top: 50%; transform: translate(-50%,-50%);
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .ruler-badge-v {
    background: #A78BFA; color: #1A1F24;
    font-family: 'Cousine', monospace; font-size: 8.5px; font-weight: 700;
    padding: 2px 5px; border-radius: 3px; white-space: nowrap;
    position: absolute;
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
    transform: translate(-50%,-50%);
    left: 50%; top: 50%;
  }
  .ruler-badge-g {
    background: var(--teal); color: #fff;
    font-family: 'Cousine', monospace; font-size: 8.5px; font-weight: 700;
    padding: 2px 5px; border-radius: 3px; white-space: nowrap;
    position: absolute;
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
    transform: translate(-50%,-50%);
    left: 50%; top: 50%;
  }

  /* colour-coded overlays */
  .ov-margin  { background: rgba(245,158,43,.12); border: 1px dashed rgba(245,158,43,.6); }
  .ov-pad     { background: rgba(167,139,250,.10); border: 1px dashed rgba(167,139,250,.5); }
  .ov-gap     { background: rgba(25,134,105,.10);  border: 1px dashed rgba(25,134,105,.4); }
  .ov-section { background: rgba(196,87,74,.08);   border: 1px dashed rgba(196,87,74,.4); }

  /* Legend */
  .annot-legend {
    display: none; position: absolute; bottom: 8px; right: 8px;
    background: rgba(26,31,36,.9); border: 1px solid rgba(255,255,255,.1);
    border-radius: 6px; padding: 8px 10px; z-index: 30;
    flex-direction: column; gap: 5px;
  }
  .annots-on .annot-legend { display: flex !important; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: rgba(255,255,255,.7); font-family: 'Cousine', monospace; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Info bar ── */
  .info-bar {
    background: rgba(25,134,105,.12); border-top: 1px solid rgba(25,134,105,.2);
    padding: 10px 20px; display: flex; gap: 24px; flex-wrap: wrap; flex-shrink: 0;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-item label { font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: rgba(255,255,255,.35); }
  .info-item span { font-family: 'Cousine', monospace; font-size: 11px; font-weight: 700; color: #4ecba4; }
</style>
</head>

    <div class="bp-tabs">

  <!-- Stage -->

let currentBP = 'lg';
let annotationsOn = false;

function setBP(bp) {
  currentBP = bp;
  const d = BPS[bp];
  const m = d.pageMargin;
  const c = d.containerPad;
  const sg = d.sectionGap;
  const cg = d.componentGap;

  // Viewport
  document.getElementById('vp-wrap').style.width = d.width + 'px';
  document.getElementById('vp-label').textContent = d.label;

  // Tabs
  document.querySelectorAll('.bp-tab').forEach((t,i) => {
    t.classList.toggle('active', ['xs','sm','md','lg','xl','2xl','3xl'][i] === bp);
  });

  // Nav
  const nav = document.getElementById('sk-nav');
  nav.style.padding = `0 ${m}px`;
  nav.style.height = d.navH + 'px';
  document.getElementById('sk-nav-logo').style.width = d.navLogoW + 'px';
  document.getElementById('sk-nav-logo').style.height = d.navLogoH + 'px';
  const navLinks = document.getElementById('sk-nav-links');
  navLinks.style.display = (bp === 'xs' || bp === 'sm') ? 'none' : 'flex';

  // Hero
  const hero = document.getElementById('sk-hero');
  hero.style.padding = `${sg * 0.5}px ${m}px`;
  hero.style.gap = d.heroGap + 'px';
  document.getElementById('sk-hero-eyebrow').style.width = d.eyebrowW + 'px';
  document.getElementById('sk-hero-eyebrow').style.height = d.eyebrowH + 'px';
  const h1w = Math.min(d.width - m*2, d.h1 * 14);
  const h1w2 = h1w * 0.7;
  document.getElementById('sk-hero-h1').style.width = h1w + 'px';
  document.getElementById('sk-hero-h1').style.height = Math.round(d.h1 * 1.2) + 'px';
  document.getElementById('sk-hero-h1-2').style.width = h1w2 + 'px';
  document.getElementById('sk-hero-h1-2').style.height = Math.round(d.h1 * 1.2) + 'px';
  const bodyW = Math.min(d.width - m*2, d.body * 28);
  document.getElementById('sk-hero-body').style.width = bodyW + 'px';
  document.getElementById('sk-hero-body').style.height = Math.round(d.body * 1.2) + 'px';
  document.getElementById('sk-hero-body-2').style.width = (bodyW * 0.85) + 'px';
  document.getElementById('sk-hero-body-2').style.height = Math.round(d.body * 1.2) + 'px';
  const btns = document.getElementById('sk-hero-btns');
  btns.style.gap = d.heroBtnGap + 'px';
  btns.style.flexDirection = (bp === 'xs') ? 'column' : 'row';
  document.getElementById('sk-hero-btn').style.width = d.heroBtn.w + 'px';
  document.getElementById('sk-hero-btn').style.height = d.heroBtn.h + 'px';
  document.getElementById('sk-hero-btn-2').style.width = d.heroBtn.w + 'px';
  document.getElementById('sk-hero-btn-2').style.height = d.heroBtn.h + 'px';

  // Margin annotations
  document.getElementById('annot-margin-l').style.width = m + 'px';
  document.getElementById('annot-margin-r').style.width = m + 'px';
  document.getElementById('lbl-margin-l').textContent = m + 'px';
  document.getElementById('lbl-margin-r').textContent = m + 'px';

  // Section gap annotation
  document.getElementById('annot-section-gap').style.height = sg + 'px';
  document.getElementById('lbl-section-gap').textContent = sg + 'px';

  // Container padding annotations
  document.getElementById('annot-pad-l').style.width = m + 'px';
  document.getElementById('annot-pad-r').style.width = m + 'px';
  document.getElementById('lbl-pad-l').textContent = m + 'px';
  document.getElementById('lbl-pad-r').textContent = m + 'px';

  // Card padding annotation
  document.getElementById('annot-card-pad').style.height = d.cardPad + 'px';
  document.getElementById('lbl-card-pad').textContent = d.cardPad + 'px';

  // Section 1
  const s1 = document.getElementById('sk-section-1');
  s1.style.padding = `${sg}px ${m}px`;
  document.getElementById('sk-label-1').style.width = '80px';
  document.getElementById('sk-label-1').style.height = d.label + 'px';
  document.getElementById('sk-title-1').style.width = Math.round(d.h2 * 10) + 'px';
  document.getElementById('sk-title-1').style.height = Math.round(d.h2 * 1.2) + 'px';
  document.getElementById('sk-sub-1').style.width = Math.round(d.body * 20) + 'px';
  document.getElementById('sk-sub-1').style.height = Math.round(d.body * 1.1) + 'px';

  // Grid
  const grid = document.getElementById('sk-grid-1');
  grid.style.gridTemplateColumns = `repeat(${d.gridCols}, 1fr)`;
  grid.style.gap = cg * 0.6 + 'px';
  ['sk-card-3','sk-card-4'].forEach(id => {
    document.getElementById(id).style.display = (d.gridCols >= 3 ? '' : 'none');
    if(id === 'sk-card-4') document.getElementById(id).style.display = (d.gridCols >= 4 ? '' : 'none');
  });
  document.querySelectorAll('.sk-card-img').forEach(el => { el.style.height = d.cardImg + 'px'; });
  document.querySelectorAll('.sk-card-body').forEach(el => { el.style.padding = d.cardPad + 'px'; });
  document.querySelectorAll('.sk-card-title').forEach(el => { el.style.height = d.cardTitleH + 'px'; });
  document.querySelectorAll('.sk-card-btn').forEach(el => { el.style.height = d.cardBtnH + 'px'; });

  // Section 2
  const s2 = document.getElementById('sk-section-2');
  s2.style.padding = `0 ${m}px ${sg}px`;
  document.getElementById('sk-title-2').style.width = Math.round(d.h3 * 8) + 'px';
  document.getElementById('sk-title-2').style.height = Math.round(d.h3 * 1.2) + 'px';

  const feats = document.getElementById('sk-features');
  feats.style.gridTemplateColumns = `repeat(${d.featureCols}, 1fr)`;
  feats.style.gap = cg * 0.5 + 'px';
  feats.style.marginTop = '16px';
  ['sk-feat-1','sk-feat-2','sk-feat-3','sk-feat-4'].forEach((id,i) => {
    const f = document.getElementById(id);
    f.style.padding = d.featPad + 'px';
    f.style.display = (i >= d.featureCols && bp === 'xs') ? 'none' : '';
    f.querySelector('.sk-feat-icon').style.width = d.featIcon + 'px';
    f.querySelector('.sk-feat-icon').style.height = d.featIcon + 'px';
    f.querySelector('.sk-feat-title').style.height = d.featTitleH + 'px';
    f.querySelector('.sk-feat-body').style.height = d.featBodyH + 'px';
  });

  // Section 3 (promo)
  const s3 = document.getElementById('sk-section-3');
  s3.style.padding = `0 ${m}px ${sg}px`;
  const promo = document.getElementById('sk-promo');
  promo.style.padding = d.promoPad + 'px';
  promo.style.gap = '8px';
  document.getElementById('sk-promo-title').style.width = Math.round(d.h2 * 9) + 'px';
  document.getElementById('sk-promo-title').style.height = d.promoTitleH + 'px';
  document.getElementById('sk-promo-body').style.width = Math.round(d.body * 22) + 'px';
  document.getElementById('sk-promo-body').style.height = d.body + 'px';
  document.getElementById('sk-promo-btn').style.width = d.promoBtnW + 'px';
  document.getElementById('sk-promo-btn').style.height = d.promoBtnH + 'px';

  // Footer
  const footer = document.getElementById('sk-footer');
  footer.style.padding = d.footerPad + 'px ' + m + 'px';
  footer.style.gridTemplateColumns = `repeat(${d.footerCols}, 1fr)`;
  footer.style.gap = d.footerGap + 'px';

  // Info bar
  const info = d.info;
  document.getElementById('info-bp').textContent = bp.toUpperCase();
  document.getElementById('info-w').textContent = d.vw + 'px';
  document.getElementById('info-margin').textContent = info.margin;
  document.getElementById('info-container').textContent = info.container;
  document.getElementById('info-section').textContent = info.section;
  document.getElementById('info-h1').textContent = info.h1;
  document.getElementById('info-body').textContent = info.body;
  document.getElementById('info-cols').textContent = info.cols;
}

function toggleAnnots() {
  annotationsOn = !annotationsOn;
  const btn = document.getElementById('annot-toggle');
  btn.classList.toggle('on', annotationsOn);
  btn.textContent = annotationsOn ? 'Annotations ON' : 'Annotations OFF';
  document.getElementById('sk-page').classList.toggle('annots-on', annotationsOn);
  document.getElementById('vp-frame').classList.toggle('annots-on', annotationsOn);
}

// Init
setBP('lg');
</script>
