<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cousine&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F8F8F8;padding:20px}
.row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid #D1D1D1}
.row:last-child{border-bottom:none}
.name{font-family:'Cousine',monospace;font-size:11px;font-weight:700;color:#575656;width:60px;flex-shrink:0}
.bar-wrap{flex:1;display:flex;align-items:center;gap:10px}
.bar{height:16px;background:#198669;border-radius:3px;opacity:.75}
.val{font-size:10.5px;color:#878686;font-family:'Cousine',monospace;white-space:nowrap;width:32px}
.token{font-size:10px;color:#878686;font-family:'Cousine',monospace}
</style>
</head>
<body>
  <div class="row"><div class="name">xs</div><div class="bar-wrap"><div class="bar" style="width:4px"></div><div class="val">4px</div></div><div class="token">--space-xs</div></div>
  <div class="row"><div class="name">sm</div><div class="bar-wrap"><div class="bar" style="width:8px"></div><div class="val">8px</div></div><div class="token">--space-sm</div></div>
  <div class="row"><div class="name">md</div><div class="bar-wrap"><div class="bar" style="width:16px"></div><div class="val">16px</div></div><div class="token">--space-md</div></div>
  <div class="row"><div class="name">lg</div><div class="bar-wrap"><div class="bar" style="width:24px"></div><div class="val">24px</div></div><div class="token">--space-lg</div></div>
  <div class="row"><div class="name">xl</div><div class="bar-wrap"><div class="bar" style="width:32px"></div><div class="val">32px</div></div><div class="token">--space-xl</div></div>
  <div class="row"><div class="name">2xl</div><div class="bar-wrap"><div class="bar" style="width:48px"></div><div class="val">48px</div></div><div class="token">--space-2xl</div></div>
  <div class="row"><div class="name">3xl</div><div class="bar-wrap"><div class="bar" style="width:64px"></div><div class="val">64px</div></div><div class="token">--space-3xl</div></div>
</body>
</html>
