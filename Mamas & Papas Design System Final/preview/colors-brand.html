<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cousine&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F8F8F8;padding:20px}
.grid{display:flex;gap:12px;flex-wrap:wrap}
.swatch{display:flex;flex-direction:column;gap:8px;min-width:130px}
.color{height:80px;border-radius:8px;border:1px solid rgba(0,0,0,.06)}
.name{font-size:11.5px;font-weight:700;color:#323232}
.hex{font-family:'Cousine',monospace;font-size:10.5px;color:#575656}
.token{font-family:'Cousine',monospace;font-size:10px;color:#878686}
</style>
</head>
<body>
<div class="grid">
  <div class="swatch">
    <div class="color" style="background:#198669"></div>
    <div class="name">Primary</div>
    <div class="hex">#198669</div>
    <div class="token">--color-primary</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#136b52"></div>
    <div class="name">Primary Dark</div>
    <div class="hex">#136b52</div>
    <div class="token">--color-primary-dark</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:rgba(25,134,105,0.07);border:1px solid rgba(25,134,105,.2)"></div>
    <div class="name">Primary Light</div>
    <div class="hex">rgba(25,134,105,.07)</div>
    <div class="token">--color-primary-light</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#C4574A"></div>
    <div class="name">Coral</div>
    <div class="hex">#C4574A</div>
    <div class="token">--color-coral</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#2C3E5A"></div>
    <div class="name">Navy</div>
    <div class="hex">#2C3E5A</div>
    <div class="token">--color-navy</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#E8A020"></div>
    <div class="name">Amber</div>
    <div class="hex">#E8A020</div>
    <div class="token">--color-amber</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#175A7B"></div>
    <div class="name">Ocean</div>
    <div class="hex">#175A7B</div>
    <div class="token">--color-ocean</div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#7B5EA7"></div>
    <div class="name">Purple</div>
    <div class="hex">#7B5EA7</div>
    <div class="token">--color-purple</div>
  </div>
</div>
</body>
</html>
