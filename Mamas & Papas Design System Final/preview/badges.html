<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F8F8F8;padding:20px}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.badge{display:inline-flex;align-items:center;font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.6px;border-radius:9999px;padding:3px 10px;white-space:nowrap;border:1px solid transparent}
.badge-new{background:#198669;color:#fff}
.badge-best{background:#E8A020;color:#323232}
.badge-eco{background:#8FA888;color:#fff}
.badge-award{background:#2C3E5A;color:#fff}
.badge-excl{background:#323232;color:#fff}
.badge-sale{background:#C4574A;color:#fff}
.badge-wish{background:#C4B5CC;color:#323232}
.badge-outline{background:transparent;font-size:11px;font-weight:600;border-radius:9999px;padding:2px 10px;border:1px solid currentColor}
.badge-loved{color:#198669}
.badge-del{color:#2C3E5A}
.badge-cert{color:#7B5EA7}
.badge-top{color:#E8A020}
.label{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#878686;margin-bottom:8px}
</style>
</head>
<body>
<div class="label">Filled badges</div>
<div class="row">
  <span class="badge badge-new">NEW IN</span>
  <span class="badge badge-best">BESTSELLER</span>
  <span class="badge badge-eco">ECO</span>
  <span class="badge badge-award">AWARD</span>
  <span class="badge badge-excl">EXCLUSIVE</span>
  <span class="badge badge-sale">SALE</span>
  <span class="badge badge-wish">WISHLIST</span>
</div>
<div class="label">Outline badges</div>
<div class="row">
  <span class="badge badge-outline badge-loved">Loved by parents</span>
  <span class="badge badge-outline badge-del">Free delivery</span>
  <span class="badge badge-outline badge-cert">Certified</span>
  <span class="badge badge-outline badge-top">Top rated</span>
</div>
</body>
</html>
