<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F8F8F8;padding:20px}
.group{margin-bottom:20px}
.label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#878686;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.14px;border-radius:4px;cursor:pointer;border:1px solid transparent;text-decoration:none;white-space:nowrap;line-height:1}
.btn-sm{padding:8px 16px;font-size:12.5px}
.btn-md{padding:11px 22px;font-size:14px}
.btn-lg{padding:13px 28px;font-size:15px}
.btn-primary{background:#198669;color:#fff;border-color:#198669}
.btn-secondary{background:#fff;color:#323232;border-color:#323232}
.btn-tertiary{background:transparent;color:#323232;border-color:#D1D1D1}
.btn-ghost{background:transparent;color:#198669;border-color:#198669}
.btn-link{background:transparent;color:#323232;border:none;padding-left:0;padding-right:0}
.btn-disabled{opacity:.4}
</style>
</head>
<body>
<div class="group">
  <div class="label">Primary</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary btn-md">Add to bag</button>
    <button class="btn btn-primary btn-lg">Shop now</button>
    <button class="btn btn-primary btn-md btn-disabled">Disabled</button>
  </div>
</div>
<div class="group">
  <div class="label">Secondary / Tertiary / Ghost</div>
  <div class="row">
    <button class="btn btn-secondary btn-md">Secondary</button>
    <button class="btn btn-tertiary btn-md">Tertiary</button>
    <button class="btn btn-ghost btn-md">Ghost teal</button>
    <button class="btn btn-link btn-md">Link →</button>
  </div>
</div>
</body>
</html>
