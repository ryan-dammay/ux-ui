<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cousine&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F8F8F8;padding:20px}
.row{display:flex;flex-wrap:wrap;gap:10px}
.chip{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:#fff;border:1px solid rgba(0,0,0,.07)}
.dot{width:28px;height:28px;border-radius:6px;border:1px solid rgba(0,0,0,.06);flex-shrink:0}
.info strong{display:block;font-size:11px;font-weight:700;color:#323232}
.info span{font-family:'Cousine',monospace;font-size:10px;color:#878686}
</style>
</head>
<body>
<div class="row">
  <div class="chip"><div class="dot" style="background:#D8EEE8"></div><div class="info"><strong>Success bg</strong><span>#D8EEE8</span></div></div>
  <div class="chip"><div class="dot" style="background:#DFEBEB"></div><div class="info"><strong>Info bg</strong><span>#DFEBEB</span></div></div>
  <div class="chip"><div class="dot" style="background:#FAEACA"></div><div class="info"><strong>Warning bg</strong><span>#FAEACA</span></div></div>
  <div class="chip"><div class="dot" style="background:#FDA8A4"></div><div class="info"><strong>Error bg</strong><span>#FDA8A4</span></div></div>
  <div class="chip"><div class="dot" style="background:#8B2925"></div><div class="info"><strong>Error</strong><span>#8B2925</span></div></div>
  <div class="chip"><div class="dot" style="background:#B38C00"></div><div class="info"><strong>Warning outline</strong><span>#B38C00</span></div></div>
  <div class="chip"><div class="dot" style="background:#8FA888"></div><div class="info"><strong>Eco</strong><span>#8FA888</span></div></div>
</div>
</body>
</html>
