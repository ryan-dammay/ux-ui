<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#F8F8F8;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:4px}
.cell{display:flex;flex-direction:column;align-items:center;gap:7px;padding:10px 4px;border-radius:8px;cursor:pointer}
.cell:hover{background:#fff}
.icon-box{width:40px;height:40px;border-radius:8px;background:#DFEBEB;display:flex;align-items:center;justify-content:center}
.icon-box i{width:18px;height:18px;stroke:#323232;stroke-width:1.5;fill:none;display:block}
.lbl{font-size:8.5px;color:#878686;text-align:center;line-height:1.3;word-break:break-word}
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="icon-box"><i data-lucide="shopping-bag"></i></div><div class="lbl">shopping-bag</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="heart"></i></div><div class="lbl">heart</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="search"></i></div><div class="lbl">search</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="user"></i></div><div class="lbl">user</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="menu"></i></div><div class="lbl">menu</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="x"></i></div><div class="lbl">x</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="chevron-right"></i></div><div class="lbl">chevron-right</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="chevron-down"></i></div><div class="lbl">chevron-down</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="star"></i></div><div class="lbl">star</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="truck"></i></div><div class="lbl">truck</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="map-pin"></i></div><div class="lbl">map-pin</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="package"></i></div><div class="lbl">package</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="refresh-cw"></i></div><div class="lbl">refresh-cw</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="shield-check"></i></div><div class="lbl">shield-check</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="check-circle"></i></div><div class="lbl">check-circle</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="alert-circle"></i></div><div class="lbl">alert-circle</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="info"></i></div><div class="lbl">info</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="trash-2"></i></div><div class="lbl">trash-2</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="edit-2"></i></div><div class="lbl">edit-2</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="filter"></i></div><div class="lbl">filter</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="sliders"></i></div><div class="lbl">sliders</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="grid"></i></div><div class="lbl">grid</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="list"></i></div><div class="lbl">list</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="arrow-left"></i></div><div class="lbl">arrow-left</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="share-2"></i></div><div class="lbl">share-2</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="mail"></i></div><div class="lbl">mail</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="phone"></i></div><div class="lbl">phone</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="tag"></i></div><div class="lbl">tag</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="percent"></i></div><div class="lbl">percent</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="gift"></i></div><div class="lbl">gift</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="lock"></i></div><div class="lbl">lock</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="eye"></i></div><div class="lbl">eye</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="credit-card"></i></div><div class="lbl">credit-card</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="message-circle"></i></div><div class="lbl">message-circle</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="send"></i></div><div class="lbl">send</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="settings"></i></div><div class="lbl">settings</div></div>
  <div class="cell"><div class="icon-box"><i data-lucide="triangle-alert"></i></div><div class="lbl">warning</div></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
