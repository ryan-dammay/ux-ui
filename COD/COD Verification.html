<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COD Verification — iPhone 13</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Black/white system lifted from the Figma */
    --cod-black: #000000;
    --cod-white: #ffffff;
    --cod-border-light: #e7e7e7;   /* collapsed card border */
    --cod-field-border: #bbbcbc;   /* otp field border */
    --cod-text-muted: #444444;     /* body copy */
    --cod-text-faint: #6e6e6e;     /* placeholder */
    --cod-page: #f4f4f4;           /* screen background */
    /* semantic (alerts) */
    --cod-error: #bf2e35;
    --cod-error-bg: #f9eaeb;
    --cod-success: #2c8349;
    --cod-success-bg: #d6f4de;
    --cod-info: #007db5;
    --cod-info-bg: #e6f5fa;
    --cod-radius: 4px;
    --font-text: 'Roboto', system-ui, sans-serif;
    --font-btn: 'Montserrat', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #2b2b2e;
    font-family: var(--font-text);
    -webkit-font-smoothing: antialiased;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* hide scrollbars inside the phone screen */
  .cod-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .cod-scroll { scrollbar-width: none; }
</style>
</head>
<body>
  <div id="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="cod-components.jsx"></script>
  <script type="text/babel" src="cod-app.jsx"></script>
</body>
</html>
