<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #e8e6e1;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100%; }
  button { font-family: inherit; }

  /* hide scrollbars for horizontal rails + screen scroll */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .screen-scroll { -webkit-overflow-scrolling: touch; }
  .screen-scroll::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes ffBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
  .ff-fab:active { transform: scale(0.94); }

  /* native iOS tap feedback — quick press-dim that eases back on release */
  button { transition: opacity 0.22s ease, transform 0.22s ease; }
  button:active { opacity: 0.55; }
  .ff-tap { transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.32,0.72,0,1); }
  .ff-tap:active { opacity: 0.7; transform: scale(0.985); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
