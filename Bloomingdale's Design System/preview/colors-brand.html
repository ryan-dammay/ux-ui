<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:"Inter"; src:url("../fonts/Inter-VariableFont_opsz,wght.ttf") format("truetype-variations"); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",sans-serif; background:#fff; padding:20px; display:flex; gap:12px; flex-wrap:wrap; }
  .swatch { width:120px; }
  .block { height:100px; border-radius:2px; }
  .label { margin-top:8px; }
  .name { font-size:11px; font-weight:600; color:#111; }
  .hex  { font-size:10px; color:#767676; font-family:monospace; margin-top:2px; }
  .desc { font-size:9px; color:#767676; margin-top:2px; line-height:1.4; }
</style>
</head>
<body>
  <div class="swatch">
    <div class="block" style="background:#111111;"></div>
    <div class="label">
      <div class="name">Black</div>
      <div class="hex">#111111</div>
      <div class="desc">Primary text & CTA buttons</div>
    </div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#FA16C8; border:1px solid #eee;"></div>
    <div class="label">
      <div class="name">Magenta</div>
      <div class="hex">#FA16C8</div>
      <div class="desc">Hover/active links &amp; accents</div>
    </div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#767676;"></div>
    <div class="label">
      <div class="name">Mid Grey</div>
      <div class="hex">#767676</div>
      <div class="desc">Secondary text, disabled</div>
    </div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#CBCBCB; border:1px solid #eee;"></div>
    <div class="label">
      <div class="name">Light Grey</div>
      <div class="hex">#CBCBCB</div>
      <div class="desc">Dividers, inactive borders</div>
    </div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#F9F9F9; border:1px solid #eee;"></div>
    <div class="label">
      <div class="name">Off-White</div>
      <div class="hex">#F9F9F9</div>
      <div class="desc">Surface fill</div>
    </div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#FFFFFF; border:1px solid #eee;"></div>
    <div class="label">
      <div class="name">White</div>
      <div class="hex">#FFFFFF</div>
      <div class="desc">Page background</div>
    </div>
  </div>
</body>
</html>
