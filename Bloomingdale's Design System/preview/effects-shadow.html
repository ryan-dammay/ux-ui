<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:"Inter"; src:url("../fonts/Inter-VariableFont_opsz,wght.ttf") format("truetype-variations"); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",sans-serif; background:#F9F9F9; padding:24px; display:flex; gap:20px; flex-wrap:wrap; align-items:flex-end; }
  .card { background:#fff; border-radius:2px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:12px; }
  .token { font-size:9px; font-family:monospace; color:#767676; margin-top:10px; text-align:center; }
  .val   { font-size:8px; color:#CBCBCB; margin-top:2px; text-align:center; }
</style>
</head>
<body>
  <div class="card" style="width:100px;height:70px;box-shadow:0px 1px 2px rgba(17,17,17,0.1);">
    <div class="token">--shadow-1</div>
    <div class="val">0 1 2 / 10%</div>
  </div>
  <div class="card" style="width:110px;height:80px;box-shadow:0px 2px 8px rgba(17,17,17,0.1);">
    <div class="token">--shadow-2</div>
    <div class="val">0 2 8 / 10%</div>
  </div>
  <div class="card" style="width:120px;height:90px;box-shadow:0px 4px 16px rgba(17,17,17,0.1);">
    <div class="token">--shadow-3</div>
    <div class="val">0 4 16 / 10%</div>
  </div>
  <div class="card" style="width:130px;height:100px;box-shadow:0px 8px 24px rgba(0,0,0,0.1);">
    <div class="token">--shadow-4</div>
    <div class="val">0 8 24 / 10%</div>
  </div>
  <div class="card" style="width:140px;height:110px;box-shadow:0px 16px 40px rgba(0,0,0,0.25);">
    <div class="token">--shadow-5</div>
    <div class="val">0 16 40 / 25%</div>
  </div>
</body>
</html>
