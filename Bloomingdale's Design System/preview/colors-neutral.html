<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:"Inter"; src:url("../fonts/Inter-VariableFont_opsz,wght.ttf") format("truetype-variations"); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Inter",sans-serif; background:#fff; padding:20px 20px 12px; display:flex; gap:0; }
  .swatch { flex:1; }
  .block { height:60px; }
  .label { padding:6px 0 0; }
  .name { font-size:9px; font-weight:600; color:#111; }
  .hex  { font-size:9px; color:#767676; font-family:monospace; }
</style>
</head>
<body>
  <div class="swatch"><div class="block" style="background:#111111;"></div><div class="label"><div class="name">1000</div><div class="hex">#111111</div></div></div>
  <div class="swatch"><div class="block" style="background:#767676;"></div><div class="label"><div class="name">700</div><div class="hex">#767676</div></div></div>
  <div class="swatch"><div class="block" style="background:#CBCBCB;"></div><div class="label"><div class="name">400</div><div class="hex">#CBCBCB</div></div></div>
  <div class="swatch"><div class="block" style="background:#DCDCDC;"></div><div class="label"><div class="name">300</div><div class="hex">#DCDCDC</div></div></div>
  <div class="swatch"><div class="block" style="background:#E8E8E8;"></div><div class="label"><div class="name">200</div><div class="hex">#E8E8E8</div></div></div>
  <div class="swatch"><div class="block" style="background:#ECECEC;"></div><div class="label"><div class="name">150</div><div class="hex">#ECECEC</div></div></div>
  <div class="swatch"><div class="block" style="background:#F9F9F9; border-top:1px solid #eee;"></div><div class="label"><div class="name">100</div><div class="hex">#F9F9F9</div></div></div>
  <div class="swatch"><div class="block" style="background:#FFFFFF; border-top:1px solid #eee;"></div><div class="label"><div class="name">0</div><div class="hex">#FFFFFF</div></div></div>
</body>
</html>
