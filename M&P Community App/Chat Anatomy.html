<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amana Chat — Screen Anatomy</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TEAL = '#198669';
const CHARCOAL = '#323232';
const LOGO_GREY = '#575656';
const LIGHT_GREY = '#F8F8F8';
const SOFT_GREY = '#D1D1D1';

/* ── Shared M&P Chip ── */
function Chip({ label, icon, color }) {
  return (
    <div style={{
      display:'inline-flex', alignItems:'center', gap:6,
      background:'#fff', border:`1.5px solid ${SOFT_GREY}`,
      borderRadius:9999, padding:'6px 12px',
      fontFamily:'Poppins', fontSize:11, fontWeight:300, color:CHARCOAL,
      whiteSpace:'nowrap',
    }}>
      <span style={{ width:20, height:20, borderRadius:'50%', background:color,
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:10 }}>{icon}</span>
      {label}
    </div>
  );
}

/* ── The annotated screen ── */
function AnnotatedScreen() {
  const W = 320, H = 693;

  // Annotation lines: { id, label, desc, x, y, dir, lx, ly }
  // dir = 'left'|'right' — which side the callout box sits
  const annotations = [
    { id:'A', label:'App Header', desc:'App identity, language switch & user avatar', x:160, y:52, dir:'right', lx:340, ly:52 },
    { id:'B', label:'AI Avatar', desc:'Branded AI icon — gradient purple circle', x:28, y:112, dir:'left', lx:-140, ly:112 },
    { id:'C', label:'AI Greeting Bubble', desc:'Rounded chat bubble, Poppins 14px/300 on white card', x:200, y:130, dir:'right', lx:340, ly:130 },
    { id:'D', label:'Suggestion Chips', desc:'Pill-shaped quick-action chips with coloured icon dots', x:145, y:390, dir:'right', lx:340, ly:380 },
    { id:'E', label:'Message Input', desc:'Light grey pill input with placeholder text', x:130, y:578, dir:'left', lx:-140, ly:578 },
    { id:'F', label:'Send Button', desc:'Teal #198669 circle CTA — primary brand colour', x:290, y:578, dir:'right', lx:340, ly:578 },
    { id:'G', label:'Bottom Tab Bar', desc:'5-tab nav; Chat active in teal, rest in grey', x:160, y:625, dir:'right', lx:340, ly:625 },
  ];

  const DOT_R = 9;
  const LINE_COLOR = TEAL;
  const LABEL_W = 160;

  return (
    <div style={{ position:'relative', width: W + 320 + 60, height: H + 60, margin:'auto' }}>

      {/* Phone mockup centred with left offset to make room for left callouts */}
      <div style={{ position:'absolute', left:180, top:30 }}>

        {/* ── Screen content (no IOSDevice frame, cleaner for anatomy) ── */}
        <div style={{
          width:W, height:H,
          borderRadius:36,
          overflow:'hidden',
          boxShadow:'0 32px 64px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.1)',
          background:LIGHT_GREY,
          position:'relative',
        }}>

          {/* Status bar */}
          <div style={{ background:'#fff', padding:'14px 20px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontFamily:'Poppins', fontSize:12, fontWeight:600, color:CHARCOAL }}>5:10</span>
            <div style={{ display:'flex', gap:4, alignItems:'center' }}>
              <svg width="14" height="10" viewBox="0 0 14 10"><rect x="0" y="5" width="2.5" height="5" rx="0.5" fill={CHARCOAL}/><rect x="3.5" y="3.5" width="2.5" height="6.5" rx="0.5" fill={CHARCOAL}/><rect x="7" y="1.5" width="2.5" height="8.5" rx="0.5" fill={CHARCOAL}/><rect x="10.5" y="0" width="2.5" height="10" rx="0.5" fill={CHARCOAL}/></svg>
              <span style={{ fontFamily:'Poppins', fontSize:10, fontWeight:600, color:CHARCOAL }}>5G</span>
              <svg width="22" height="11" viewBox="0 0 22 11"><rect x="0.5" y="0.5" width="19" height="10" rx="2.5" stroke={CHARCOAL} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="14" height="7" rx="1.5" fill={CHARCOAL}/><path d="M21 3.5v4c.7-.3 1.2-1 1.2-2s-.5-1.7-1.2-2z" fill={CHARCOAL} fillOpacity="0.4"/></svg>
            </div>
          </div>

          {/* Header */}
          <div style={{ background:'#fff', padding:'10px 14px 10px', display:'flex', alignItems:'center', gap:10, borderBottom:`1px solid ${SOFT_GREY}` }}>
            <div style={{ width:34, height:34, borderRadius:9, background:'linear-gradient(135deg,#2979CC,#1565C0)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><circle cx="7" cy="12" r="3" fill="#fff"/><circle cx="17" cy="12" r="3" fill="#fff"/><circle cx="12" cy="12" r="3" fill="rgba(255,255,255,0.4)"/></svg>
            </div>
            <span style={{ fontFamily:'Poppins', fontWeight:600, fontSize:16, color:CHARCOAL, flex:1 }}>Amana</span>
            <div style={{ display:'flex', alignItems:'center', gap:4, border:`1.5px solid ${SOFT_GREY}`, borderRadius:9999, padding:'3px 10px' }}>
              <svg width="12" height="12" fill="none" stroke={CHARCOAL} strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
              <span style={{ fontFamily:'Poppins', fontSize:10, fontWeight:600, color:CHARCOAL }}>AR</span>
            </div>
            <div style={{ width:30, height:30, borderRadius:'50%', background:'#7B5EA7', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <span style={{ fontFamily:'Poppins', fontSize:12, fontWeight:600, color:'#fff' }}>T</span>
            </div>
          </div>

          {/* Chat area */}
          <div style={{ padding:'16px 12px 10px', flex:1 }}>
            {/* AI message */}
            <div style={{ display:'flex', gap:8, alignItems:'flex-start', marginBottom:16 }}>
              <div style={{ width:30, height:30, borderRadius:'50%', background:'linear-gradient(135deg,#7B5EA7,#4A3B8C)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <svg width="14" height="14" fill="#fff" viewBox="0 0 24 24"><path d="M12 2L9 9H2l5.5 4-2 7L12 16l6.5 4-2-7L22 9h-7L12 2z"/></svg>
              </div>
              <div>
                <div style={{ fontFamily:'Poppins', fontSize:9, fontWeight:600, color:LOGO_GREY, marginBottom:4 }}>Amana</div>
                <div style={{ background:'#fff', borderRadius:'3px 12px 12px 12px', padding:'10px 12px', maxWidth:210, boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
                  <p style={{ fontFamily:'Poppins', fontSize:11, fontWeight:300, color:CHARCOAL, lineHeight:1.6, margin:0 }}>Hello! 👋 I'm Amana, your AI parenting assistant. Welcome back, Talal!</p>
                  <p style={{ fontFamily:'Poppins', fontSize:11, fontWeight:300, color:CHARCOAL, lineHeight:1.6, marginTop:8, marginBottom:0 }}>How can I help you today? 🖊️</p>
                </div>
              </div>
            </div>

            {/* Suggestions */}
            <div style={{ marginTop:60 }}>
              <p style={{ fontFamily:'Poppins', fontSize:9, fontWeight:300, color:LOGO_GREY, marginBottom:8 }}>Try asking about</p>
              <div style={{ marginBottom:7 }}><Chip label="Due date calculator" icon="📅" color="#FAEACA"/></div>
              <div style={{ display:'flex', gap:6, marginBottom:7 }}>
                <Chip label="Emotional support" icon="💜" color="#F0EAFF"/>
                <Chip label="Sleep tips" icon="🌙" color="#DFEBEB"/>
              </div>
              <div style={{ display:'flex', gap:6, marginBottom:7 }}>
                <Chip label="Gift ideas" icon="🎁" color="#D8EEE8"/>
                <Chip label="Track milestones" icon="📈" color="#EAF0FF"/>
              </div>
              <div><Chip label="Product help" icon="🛍️" color="#FFE8D6"/></div>
            </div>
          </div>

          {/* Input */}
          <div style={{ background:'#fff', borderTop:`1px solid ${SOFT_GREY}`, padding:'10px 12px', display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ flex:1, background:LIGHT_GREY, borderRadius:9999, padding:'8px 14px' }}>
              <span style={{ fontFamily:'Poppins', fontSize:11, fontWeight:300, color:'#ABABAB' }}>Type a message...</span>
            </div>
            <div style={{ width:36, height:36, borderRadius:'50%', background:TEAL, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="2.2"><path d="M5 12h14M12 5l7 7-7 7" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{ background:'#fff', borderTop:`1px solid ${SOFT_GREY}`, padding:'6px 0 4px', display:'flex' }}>
            {[
              { active:true, icon:<svg width="18" height="18" fill="none" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="4" fill={TEAL}/><path d="M8 21l4-4h4" stroke={TEAL} strokeWidth="1.8" strokeLinecap="round"/></svg>, label:'Chat' },
              { active:false, icon:<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#9E9E9E" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3" strokeLinecap="round"/></svg> },
              { active:false, icon:<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#9E9E9E" strokeWidth="1.5"><path d="M4 19V6a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H7l-3 3z"/></svg> },
              { active:false, icon:<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#9E9E9E" strokeWidth="1.5"><path d="M3 12h18M3 6h18M3 18h10" strokeLinecap="round"/></svg> },
              { active:false, icon:<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#9E9E9E" strokeWidth="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg> },
            ].map((t,i) => (
              <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
                {t.icon}
                {t.label && <span style={{ fontFamily:'Poppins', fontSize:8, fontWeight:600, color:TEAL }}>{t.label}</span>}
              </div>
            ))}
          </div>
        </div>

        {/* ── SVG annotation layer ── */}
        <svg
          style={{ position:'absolute', top:0, left:0, overflow:'visible', pointerEvents:'none' }}
          width={W} height={H}
        >
          {annotations.map((a) => {
            const isRight = a.dir === 'right';
            // endpoint on screen
            const ex = a.x, ey = a.y;
            // callout box position (relative to phone left=0)
            const bx = isRight ? a.lx : a.lx - LABEL_W;
            // mid-point for elbow
            const midX = isRight ? ex + (a.lx - ex) * 0.5 : ex + (a.lx + LABEL_W - ex) * 0.5;

            return (
              <g key={a.id}>
                {/* dot on screen */}
                <circle cx={ex} cy={ey} r={DOT_R} fill={TEAL} opacity="0.15"/>
                <circle cx={ex} cy={ey} r={DOT_R - 3} fill={TEAL}/>
                <text x={ex} y={ey + 4} textAnchor="middle" fill="#fff" fontSize={8} fontWeight="700" fontFamily="Poppins">{a.id}</text>
                {/* elbow line */}
                <polyline
                  points={`${ex},${ey} ${midX},${ey} ${isRight ? a.lx : a.lx + LABEL_W},${a.ly}`}
                  fill="none" stroke={TEAL} strokeWidth="1.2" strokeDasharray="4 3" opacity="0.6"
                />
              </g>
            );
          })}
        </svg>

        {/* ── Callout boxes (positioned relative to phone) ── */}
        {annotations.map((a) => {
          const isRight = a.dir === 'right';
          const left = isRight ? W + (a.lx - W) : a.lx - LABEL_W;
          return (
            <div key={a.id} style={{
              position:'absolute',
              top: a.ly - 22,
              left: left,
              width: LABEL_W,
              background:'#fff',
              borderRadius:8,
              padding:'8px 10px',
              boxShadow:'0 2px 12px rgba(0,0,0,0.10)',
              borderLeft: isRight ? `3px solid ${TEAL}` : 'none',
              borderRight: !isRight ? `3px solid ${TEAL}` : 'none',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
                <div style={{ width:16, height:16, borderRadius:'50%', background:TEAL, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontFamily:'Poppins', fontSize:8, fontWeight:700, color:'#fff' }}>{a.id}</span>
                </div>
                <span style={{ fontFamily:'Poppins', fontSize:10, fontWeight:600, color:CHARCOAL }}>{a.label}</span>
              </div>
              <p style={{ fontFamily:'Poppins', fontSize:9, fontWeight:300, color:LOGO_GREY, lineHeight:1.5, margin:0 }}>{a.desc}</p>
            </div>
          );
        })}
      </div>

      {/* Title */}
      <div style={{ position:'absolute', top:-10, left:180, fontFamily:'Poppins', fontSize:11, fontWeight:600, color:LOGO_GREY, letterSpacing:2, textTransform:'uppercase' }}>
        Screen Anatomy
      </div>
    </div>
  );
}

/* ── Legend / token reference ── */
function TokenRow({ swatch, label, value }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
      {swatch}
      <div>
        <div style={{ fontFamily:'Poppins', fontSize:11, fontWeight:600, color:CHARCOAL }}>{label}</div>
        <div style={{ fontFamily:'Poppins', fontSize:10, fontWeight:300, color:LOGO_GREY }}>{value}</div>
      </div>
    </div>
  );
}

function Legend() {
  const swatch = (bg, border) => (
    <div style={{ width:28, height:28, borderRadius:6, background:bg, border: border || 'none', flexShrink:0 }}/>
  );
  return (
    <div style={{ background:'#fff', borderRadius:12, padding:'20px 22px', width:220, boxShadow:'0 2px 12px rgba(0,0,0,0.07)' }}>
      <div style={{ fontFamily:'Poppins', fontSize:12, fontWeight:600, color:CHARCOAL, marginBottom:14, textTransform:'uppercase', letterSpacing:1 }}>Design Tokens</div>
      <TokenRow swatch={swatch(TEAL)} label="Primary / Teal" value="#198669 — CTAs, icons, active" />
      <TokenRow swatch={swatch(CHARCOAL)} label="Charcoal" value="#323232 — all text" />
      <TokenRow swatch={swatch('#7B5EA7')} label="AI Brand Purple" value="#7B5EA7 — Amana avatar" />
      <TokenRow swatch={swatch('#2979CC')} label="App Icon Blue" value="#2979CC — app icon gradient" />
      <TokenRow swatch={swatch(LIGHT_GREY, `1px solid ${SOFT_GREY}`)} label="Light Grey" value="#F8F8F8 — screen bg, input" />
      <TokenRow swatch={swatch('#fff', `1px solid ${SOFT_GREY}`)} label="White" value="#FFFFFF — cards, header, bars" />
      <div style={{ borderTop:`1px solid ${SOFT_GREY}`, marginTop:12, paddingTop:12 }}>
        <div style={{ fontFamily:'Poppins', fontSize:11, fontWeight:600, color:CHARCOAL, marginBottom:8 }}>Typography</div>
        <div style={{ fontFamily:'Poppins', fontSize:10, fontWeight:300, color:LOGO_GREY, lineHeight:1.8 }}>
          Poppins 600 — App name, tabs<br/>
          Poppins 300 — Body, chips, input<br/>
          Min size: 9px (scaled)<br/>
          Colour: Charcoal #323232
        </div>
      </div>
      <div style={{ borderTop:`1px solid ${SOFT_GREY}`, marginTop:12, paddingTop:12 }}>
        <div style={{ fontFamily:'Poppins', fontSize:11, fontWeight:600, color:CHARCOAL, marginBottom:8 }}>Shape</div>
        <div style={{ fontFamily:'Poppins', fontSize:10, fontWeight:300, color:LOGO_GREY, lineHeight:1.8 }}>
          Buttons / input: pill (9999px)<br/>
          Cards: 8px radius<br/>
          Chat bubble: 3px / 12px<br/>
          Avatars: 50% circle
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="anatomy" title="Amana Chat — Screen Anatomy" subtitle="M&P Community App · April 2026">
        <DCArtboard id="annotated" label="Annotated Screen" width={820} height={760}>
          <div style={{ width:'100%', height:'100%', background:'#F8F6F0', display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
            <AnnotatedScreen />
          </div>
        </DCArtboard>
        <DCArtboard id="legend" label="Design Tokens" width={280} height={520}>
          <div style={{ width:'100%', height:'100%', background:'#F8F6F0', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
            <Legend />
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
