<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift Message Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #404040;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useRef } = React;

const MAX_CHARS = 400;

/* ── Checkbox ── */
function Checkbox({ checked, onChange }) {
  return (
    <div
      onClick={onChange}
      style={{
        width: 20, height: 20, borderRadius: 2, flexShrink: 0,
        backgroundColor: checked ? 'rgb(17,17,17)' : 'rgb(255,255,255)',
        border: checked ? '1px solid rgb(17,17,17)' : '1px solid rgb(203,203,203)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', transition: 'background 0.15s'
      }}>
      
      {checked &&
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6L5 9L10 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      }
    </div>);

}

/* ── Learn More link ── */
function LearnMore() {
  const [hovered, setHovered] = React.useState(false);
  return (
    <span style={{ position: 'relative', display: 'inline-block' }}
    onMouseEnter={() => setHovered(true)}
    onMouseLeave={() => setHovered(false)}>
      
      <span style={{
        fontFamily: 'Inter', fontWeight: 700, fontSize: 14,
        color: 'rgb(17,17,17)', textDecoration: 'underline',
        cursor: 'not-allowed', lineHeight: 1
      }}>Learn More</span>
      {hovered &&
      <span style={{
        position: 'absolute',
        bottom: 'calc(100% + 8px)',
        left: '50%',
        transform: 'translateX(-50%)',
        backgroundColor: 'rgb(40,40,40)',
        color: '#fff',
        fontSize: 11,
        lineHeight: '15px',
        fontFamily: 'Inter',
        fontWeight: 400,
        padding: '6px 10px',
        borderRadius: 6,
        whiteSpace: 'normal',
        textAlign: 'center',
        width: 180,
        pointerEvents: 'none',
        zIndex: 100,
        boxShadow: '0 2px 8px rgba(0,0,0,0.25)'
      }}>
          This is a working prototype.<br />This link is not accessible.
          <span style={{
          position: 'absolute',
          top: '100%', left: '50%',
          transform: 'translateX(-50%)',
          borderLeft: '5px solid transparent',
          borderRight: '5px solid transparent',
          borderTop: '5px solid rgb(40,40,40)'
        }} />
        </span>
      }
    </span>);

}

/* ── Main component ── */
function GiftMessageFlow() {
  const DEFAULT_MESSAGE = "Hope you enjoy your gift! Have a wonderful day.\n\nBloomingdale's Team";
  const [isGift, setIsGift] = useState(false);
  const [message, setMessage] = useState('');
  const [isEditing, setIsEditing] = useState(false);
  const textareaRef = useRef(null);
  const remaining = MAX_CHARS - message.length;

  const handleToggleGift = () => {
    const next = !isGift;
    setIsGift(next);
    if (next && message === '') {
      setMessage(DEFAULT_MESSAGE);
      setIsEditing(false);
    }
    if (!next) {
      setIsEditing(false);
    }
  };

  const handleActivateEdit = () => {
    setIsEditing(true);
    setTimeout(() => {
      if (textareaRef.current) {
        textareaRef.current.focus();
        const len = textareaRef.current.value.length;
        textareaRef.current.setSelectionRange(len, len);
      }
    }, 30);
  };

  const handleBlur = () => {
    setIsEditing(false);
  };

  const handleClear = () => {
    setMessage('');
    setIsEditing(true);
    setTimeout(() => {
      if (textareaRef.current) {
        textareaRef.current.focus();
      }
    }, 30);
  };

  return (
    <div style={{
      width: 375,
      backgroundColor: 'rgb(249,249,249)',
      fontFamily: 'Inter'
    }}>
      {/* Header */}
      <div style={{ padding: '16px 20px 0 20px' }}>
        <span style={{
          display: 'block',
          fontWeight: 700, fontSize: 16,
          lineHeight: '22px', color: 'rgb(17,17,17)'
        }}>Packaging and Gifting</span>
      </div>

      {/* Top block — checkbox */}
      <div style={{ padding: '12px 20px 0 20px', width: "361px" }}>
        <div style={{
          border: '1px solid rgb(203,203,203)',
          padding: '16px',
          transition: 'all 0.2s ease'
        }}>
          {/* Checkbox row */}
          <div style={{ display: 'flex', flexDirection: 'row', alignItems: 'center', gap: 12 }}>
            <Checkbox checked={isGift} onChange={handleToggleGift} />
            <span style={{ fontWeight: 700, fontSize: 14, color: 'rgb(17,17,17)', lineHeight: '20px' }}>
              This order is a gift
            </span>
          </div>

          {/* Expanded content */}
          <div style={{
            overflow: 'hidden',
            maxHeight: isGift ? 200 : 0,
            opacity: isGift ? 1 : 0,
            transition: 'max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1)'
          }}>
            <p style={{
              marginTop: 12,
              fontSize: 14, lineHeight: '20px', color: 'rgb(17,17,17)'
            }}>
              Your order will be packed in Signature Packaging, along with a printed gift card with your gift message.
            </p>
            <div style={{ marginTop: 12 }}>
              <LearnMore />
            </div>
          </div>

          {/* Collapsed Learn More */}
          {!isGift &&
          <div style={{ marginTop: 12 }}>
              <LearnMore />
            </div>
          }
        </div>
      </div>

      {/* Gift message section */}
      <div style={{
        overflow: 'hidden',
        maxHeight: isGift ? 320 : 0,
        opacity: isGift ? 1 : 0,
        transition: 'max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.05s, opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1) 0.05s'
      }}>
        <div style={{ padding: '16px 20px 0 20px' }}>
          {/* Label row */}
          <div style={{
            display: 'flex', flexDirection: 'row',
            justifyContent: 'space-between', alignItems: 'center',
            marginBottom: 8
          }}>
            <span style={{ fontWeight: 700, fontSize: 14, color: 'rgb(17,17,17)', lineHeight: '20px' }}>
              Gift Message
            </span>
            <span
              onClick={message.length > 0 ? handleClear : undefined}
              style={{
                fontWeight: 700, fontSize: 14, lineHeight: '20px',
                visibility: isGift ? 'visible' : 'hidden',
                color: message.length > 0 ? 'rgb(17,17,17)' : 'rgb(180,180,180)',
                textDecoration: 'underline',
                cursor: message.length > 0 ? 'pointer' : 'default',
                transition: 'color 0.15s, text-decoration 0.15s'
              }}>
              Clear</span>
          </div>

          {/* Textarea — filled display or active editing */}
          {isEditing ?
          <textarea
            ref={textareaRef}
            value={message}
            onChange={(e) => setMessage(e.target.value.slice(0, MAX_CHARS))}
            onBlur={handleBlur}
            placeholder="Add your gift message here (Optional)"
            style={{
              width: '100%',
              height: 124,
              resize: 'none',
              border: '1.5px solid rgb(17,17,17)',
              outline: 'none',
              padding: '12px',
              fontFamily: 'Inter',
              fontSize: 14,
              lineHeight: '20px',
              color: 'rgb(17,17,17)',
              backgroundColor: 'rgb(255,255,255)',
              borderRadius: 0,
              display: 'block'
            }} /> :


          <div
            onClick={handleActivateEdit}
            style={{
              width: '100%',
              border: '1px solid rgb(203,203,203)',
              padding: '12px',
              fontFamily: 'Inter',
              fontSize: 14,
              lineHeight: '20px',
              color: message ? 'rgb(17,17,17)' : 'rgb(180,180,180)',
              backgroundColor: 'rgb(255,255,255)',
              height: 124,
              cursor: 'text',
              whiteSpace: 'pre-wrap',
              wordBreak: 'break-word'
            }}>
            
              {message || 'Add your gift message here (Optional)'}
            </div>
          }

          {/* Character count */}
          <p style={{
            marginTop: 6,
            fontSize: 12,
            color: remaining < 50 ? '#c0392b' : 'rgb(140,140,140)',
            lineHeight: '16px'
          }}>
            {remaining} character{remaining !== 1 ? 's' : ''} remaining
          </p>

          {/* Preview CTA */}
          <div style={{ marginTop: 16, marginBottom: 16 }}>
            <span style={{
              fontWeight: 700, fontSize: 14, color: 'rgb(17,17,17)',
              textDecoration: 'underline', cursor: 'pointer', lineHeight: '20px'
            }}>Preview Your Gift Card</span>
          </div>
        </div>
      </div>

      {/* Bottom padding */}
      <div style={{ height: 16 }} />
    </div>);

}

/* ── App shell ── */
function App() {
  const DEVICE_H = 874;
  const DEVICE_W = 402;
  const scale = Math.min(1, window.innerHeight * 0.95 / DEVICE_H, window.innerWidth * 0.95 / DEVICE_W);
  return (
    <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
      <IOSDevice statusBarStyle="dark">
        <div style={{
          width: '100%',
          flex: 1,
          backgroundColor: 'rgb(249,249,249)',
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'center',
          paddingTop: 60,
          paddingBottom: 34
        }}>
          <GiftMessageFlow />
        </div>
      </IOSDevice>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
