<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamas & Papas — Features</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Poppins', sans-serif;
    background: #F8F8F8;
    color: #323232;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .features-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 40px;
  }

  .features-header {
    text-align: center;
    margin-bottom: 72px;
  }

  .features-overline {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #198669;
    margin-bottom: 12px;
  }

  .features-title {
    font-size: clamp(28px, 3.5vw, 42px);
    font-weight: 700;
    color: #323232;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .features-subtitle {
    font-size: 15px;
    color: #878686;
    font-weight: 400;
    line-height: 1.7;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ── Two-column sticky layout ── */
  .features-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  /* ── Sticky visual panel ── */
  .sticky-panel {
    position: sticky;
    top: 40px;
    height: 560px;
    border-radius: 16px;
    background: #F8F6F0;
    border: 1px solid #D1D1D1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 2px -1px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.1);
  }

  .visual-inner {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .visual-slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
  }

  .visual-slide.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .visual-icon-wrap {
    width: 88px;
    height: 88px;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    transition: background 0.45s ease;
  }

  .visual-tag {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 9999px;
    margin-bottom: 20px;
  }

  .visual-headline {
    font-size: 22px;
    font-weight: 700;
    color: #323232;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .visual-sub {
    font-size: 12.5px;
    color: #878686;
    text-align: center;
    line-height: 1.6;
    max-width: 240px;
  }

  /* Progress dots */
  .progress-dots {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 7px;
  }

  .progress-dot {
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: #D1D1D1;
    transition: background 0.3s ease, width 0.3s ease;
  }

  .progress-dot.active {
    background: #198669;
    width: 22px;
  }

  /* Illustration shapes */
  .visual-illustration {
    width: 200px;
    height: 160px;
    margin-bottom: 28px;
    position: relative;
  }

  /* ── Scroll feature list ── */
  .feature-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .feature-item {
    padding: 40px 0;
    border-bottom: 1px solid #D1D1D1;
    cursor: default;
    transition: all 0.3s ease;
  }

  .feature-item:first-child {
    padding-top: 0;
  }

  .feature-item:last-child {
    border-bottom: none;
  }

  .feature-step {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #D1D1D1;
    margin-bottom: 10px;
    transition: color 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feature-item.active .feature-step {
    color: #198669;
  }

  .feature-step-line {
    flex: 1;
    height: 1px;
    background: #D1D1D1;
    transition: background 0.3s ease;
  }

  .feature-item.active .feature-step-line {
    background: #198669;
  }

  .feature-name {
    font-size: 20px;
    font-weight: 700;
    color: #D1D1D1;
    margin-bottom: 12px;
    transition: color 0.3s ease;
    line-height: 1.3;
  }

  .feature-item.active .feature-name {
    color: #323232;
  }

  .feature-desc {
    font-size: 14px;
    line-height: 1.7;
    color: #D1D1D1;
    transition: color 0.3s ease;
    max-width: 420px;
  }

  .feature-item.active .feature-desc {
    color: #575656;
  }

  .feature-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 18px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease 0.1s, transform 0.35s ease 0.1s;
  }

  .feature-item.active .feature-chips {
    opacity: 1;
    transform: translateY(0);
  }

  .feature-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 9999px;
    border: 1.5px solid #D1D1D1;
    color: #575656;
    background: #fff;
  }

  .feature-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 13px;
    font-weight: 600;
    color: #198669;
    text-decoration: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s ease 0.15s, transform 0.35s ease 0.15s, gap 0.15s ease;
    cursor: pointer;
  }

  .feature-item.active .feature-cta {
    opacity: 1;
    transform: translateY(0);
  }

  .feature-cta:hover { gap: 10px; }

  /* Sentinel spacers for scroll detection */
  .feature-sentinel {
    height: 1px;
    margin-bottom: -1px;
  }
</style>
</head>
<body>
<div id="root"></div>

  1: ({ color }) => (
    <svg width="200" height="150" viewBox="0 0 200 150" fill="none">
      {/* Path / road */}

      {/* Pushchair body */}
      <rect x="70" y="55" width="55" height="42" rx="8" fill="#2C3E5A" opacity=".12" />

      {/* Handle */}
      <path d="M118 60 L140 42" stroke="#2C3E5A" strokeWidth="4" strokeLinecap="round" opacity=".5" />
      {/* Wheels */}
      <circle cx="82" cy="107" r="10" fill="none" stroke="#2C3E5A" strokeWidth="3" opacity=".4" />
      <circle cx="82" cy="107" r="4" fill="#2C3E5A" opacity=".3" />
      <circle cx="118" cy="107" r="10" fill="none" stroke="#2C3E5A" strokeWidth="3" opacity=".4" />
      <circle cx="118" cy="107" r="4" fill="#2C3E5A" opacity=".3" />
      {/* Baby silhouette */}
      <circle cx="97" cy="68" r="9" fill="#2C3E5A" opacity=".2" />
      {/* Motion lines */}
      <line x1="30" y1="75" x2="50" y2="75" stroke="#2C3E5A" strokeWidth="2" strokeLinecap="round" opacity=".2" />
      <line x1="22" y1="85" x2="46" y2="85" stroke="#2C3E5A" strokeWidth="2" strokeLinecap="round" opacity=".15" />
      <line x1="28" y1="65" x2="46" y2="65" stroke="#2C3E5A" strokeWidth="2" strokeLinecap="round" opacity=".12" />

  2: ({ color }) => (
    <svg width="180" height="150" viewBox="0 0 180 150" fill="none">
      {/* Ground circle */}
      <ellipse cx="90" cy="128" rx="55" ry="8" fill="rgba(25,134,105,.06)" />
      {/* Leaf shapes */}
      <ellipse cx="90" cy="62" rx="28" ry="44" fill="rgba(25,134,105,.12)" transform="rotate(-15 90 62)" />

      <ellipse cx="90" cy="70" rx="16" ry="30" fill="rgba(25,134,105,.18)" />
      {/* Stem */}

      {/* Dots */}

      <circle cx="142" cy="58" r="5" fill="#198669" opacity=".15" />

      <circle cx="138" cy="115" r="3.5" fill="#198669" opacity=".15" />
      {/* Sparkle */}
      <path d="M148 30 L150 36 L156 38 L150 40 L148 46 L146 40 L140 38 L146 36 Z" fill="#198669" opacity=".2" />

  3: ({ color }) => (
    <svg width="190" height="150" viewBox="0 0 190 150" fill="none">
      {/* Chat bubbles */}
      <rect x="20" y="30" width="110" height="52" rx="12" fill="rgba(23,90,123,.12)" />
      <rect x="22" y="32" width="106" height="48" rx="10" fill="rgba(23,90,123,.16)" />

/* ── Feature Visual Panel ── */
const StickyVisual = ({ activeIdx }) => {
  const f = FEATURES[activeIdx];
  return (
    <div className="sticky-panel">
      <div className="visual-inner">
        {FEATURES.map((feat, i) => {
          const Illus = Illustrations[feat.id];
          return (
            <div key={feat.id} className={`visual-slide${activeIdx === i ? ' active' : ''}`}
              style={{ background: feat.visual.bg }}>
              <div className="visual-tag" style={{ background: feat.tagBg, color: feat.tagColor }}>
                {feat.tag}
              </div>
              <Illus color={feat.iconColor} />
              <div className="visual-headline">{feat.name}</div>
              <div className="visual-sub">{feat.desc.split('.')[0]}.</div>
            </div>
          );
        })}

        <div className="progress-dots">
          {FEATURES.map((_, i) => (
            <div key={i} className={`progress-dot${activeIdx === i ? ' active' : ''}`}></div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── Feature Item ── */
const FeatureItem = ({ feature, isActive, sentinelRef }) => (
  <div>
    <div ref={sentinelRef} className="feature-sentinel"></div>
    <div className={`feature-item${isActive ? ' active' : ''}`}>
      <div className="feature-step">
        <span>{feature.step}</span>
        <span className="feature-step-line"></span>
      </div>
      <div className="feature-name">{feature.name}</div>
      <div className="feature-desc">{feature.desc}</div>
      <div className="feature-chips">
        {feature.chips.map(chip => (
          <span key={chip} className="feature-chip">{chip}</span>
        ))}
      </div>
      <a className="feature-cta">
        {feature.cta}
        <i data-lucide="arrow-right" style={{ width: 14, height: 14, stroke: 'currentColor', strokeWidth: 2, fill: 'none' }}></i>
      </a>
    </div>
  </div>
);

/* ── Main App ── */
const App = () => {
  const [activeIdx, setActiveIdx] = React.useState(0);
  const sentinelRefs = React.useRef(FEATURES.map(() => React.createRef()));

  React.useEffect(() => {
    const observers = [];

    sentinelRefs.current.forEach((ref, i) => {
      if (!ref.current) return;
      const obs = new IntersectionObserver(
        ([entry]) => {
          if (entry.isIntersecting) setActiveIdx(i);
        },
        { rootMargin: '-30% 0px -60% 0px', threshold: 0 }
      );
      obs.observe(ref.current);
      observers.push(obs);
    });

    return () => observers.forEach(o => o.disconnect());
  }, []);

  React.useEffect(() => {
    lucide.createIcons();
  });

  return (
    <div style={{ minHeight: '100vh' }}>
      {/* Simple top bar */}
      <div style={{ background: '#323232', padding: '10px 24px', textAlign: 'center' }}>
        <span style={{ fontSize: 11.5, color: 'rgba(255,255,255,.7)', letterSpacing: '.03em' }}>
          Free delivery on orders over £50 · Free returns · 0% finance available
        </span>
      </div>

      {/* Header */}
      <header style={{ background: '#fff', borderBottom: '1px solid #D1D1D1', padding: '0 40px' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 64 }}>
          <img src="assets/logo-wordmark.svg" width="96" height="36" alt="Mamas & Papas" style={{ display: 'block' }} />
          <nav style={{ display: 'flex', gap: 28 }}>
            {['Pushchairs', 'Car Seats', 'Nursery', 'Clothing', 'Sale'].map(n => (
              <a key={n} href="#" style={{ fontSize: 13, fontWeight: 500, color: '#323232', textDecoration: 'none', transition: 'color .15s' }}
                onMouseEnter={e => e.target.style.color = '#198669'}
                onMouseLeave={e => e.target.style.color = '#323232'}>{n}</a>
            ))}
          </nav>
          <div style={{ display: 'flex', gap: 16 }}>
            {['search', 'user', 'shopping-bag'].map(icon => (
              <button key={icon} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: '#323232' }}>
                <i data-lucide={icon} style={{ width: 18, height: 18, stroke: 'currentColor', strokeWidth: 1.5, fill: 'none', display: 'block' }}></i>
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* Feature section */}
      <section className="features-section">
        {/* Section header */}
        <div className="features-header">
          <div className="features-overline">Why Mamas &amp; Papas</div>
          <h2 className="features-title">Beautifully made.<br />Beautifully trusted.</h2>
          <p className="features-subtitle">For over 40 years we've been making products that parents love and babies thrive in.</p>
        </div>

        {/* Two-col layout */}
        <div className="features-body">
          {/* LEFT: sticky visual */}
          <StickyVisual activeIdx={activeIdx} />

          {/* RIGHT: scrolling features */}
          <div className="feature-list">
            {FEATURES.map((feat, i) => (
              <FeatureItem
                key={feat.id}
                feature={feat}
                isActive={activeIdx === i}
                sentinelRef={sentinelRefs.current[i]}
              />
            ))}
          </div>
        </div>
      </section>

      {/* Bottom trust strip */}
      <div style={{ background: '#fff', borderTop: '1px solid #D1D1D1', padding: '32px 40px' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'center', gap: 48, flexWrap: 'wrap' }}>
          {[
            { icon: 'award', label: 'Award-winning design' },
            { icon: 'shield-check', label: 'Safety certified' },
            { icon: 'truck', label: 'Free delivery over £50' },
            { icon: 'rotate-ccw', label: '30-day free returns' },
          ].map(({ icon, label }) => (
            <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <i data-lucide={icon} style={{ width: 16, height: 16, stroke: '#198669', strokeWidth: 1.5, fill: 'none', flexShrink: 0 }}></i>
              <span style={{ fontSize: 12.5, fontWeight: 500, color: '#575656' }}>{label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
