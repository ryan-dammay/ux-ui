<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamas & Papas — Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Poppins', sans-serif; background: #F8F8F8; color: #323232; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* Featured post image placeholder */
  .img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }

  /* Card hover */
  .post-card {
    background: #fff;
    border: 1px solid #D1D1D1;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .post-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
  }

  /* Featured card hover */
  .featured-card {
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.15s ease;
  }
  .featured-card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
  }

  /* Category pill active */
  .cat-pill {
    padding: 7px 18px;
    border-radius: 9999px;
    border: 1.5px solid #D1D1D1;
    background: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    color: #575656;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .cat-pill:hover {
    border-color: #198669;
    color: #198669;
  }
  .cat-pill.active {
    background: #198669;
    border-color: #198669;
    color: #fff;
  }

  /* Read more link */
  .read-more {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #198669;
    text-decoration: none;
    transition: gap 0.15s ease;
  }
  .read-more:hover { gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ─── Data ─── */
const POSTS = [
  {
    id: 1,
    category: 'New Arrivals',
    categoryColor: '#198669',
    title: 'Introducing the Ocarro 2025: Effortless from day one',
    excerpt: 'Our most-loved pushchair gets a considered refresh — lighter frame, smoother fold, and a new range of nature-inspired colourways that parents will adore.',
    author: 'Emma Clarke',
    authorRole: 'Product Editor',
    date: '24 April 2025',
    readTime: '5 min read',
    featured: true,
    imgColor: '#D8EEE8',
    imgAccent: '#198669',
    imgIcon: 'navigation',
    tags: ['Pushchairs', 'New In', 'Ocarro'],
  },
  {
    id: 2,
    category: 'Buying Guides',
    categoryColor: '#175A7B',
    title: 'How to choose your first car seat',
    excerpt: 'From Group 0+ to i-Size, we break down everything you need to know to keep your little one safe on every journey.',
    author: 'Dr. Sophie Hart',
    authorRole: 'Safety Advisor',
    date: '18 April 2025',
    readTime: '8 min read',
    imgColor: '#DFEBEB',
    imgAccent: '#175A7B',
    imgIcon: 'shield-check',
    tags: ['Car Seats', 'Safety'],
  },
  {
    id: 3,
    category: 'Style',
    categoryColor: '#7B5EA7',
    title: 'Nursery colour palettes for 2025',
    excerpt: 'Soft sage, warm terracotta, and dusty rose — the shades that are making nurseries feel beautifully serene this year.',
    author: 'Anya Patel',
    authorRole: 'Interior Stylist',
    date: '12 April 2025',
    readTime: '4 min read',
    imgColor: '#F8F6F0',
    imgAccent: '#7B5EA7',
    imgIcon: 'home',
    tags: ['Nursery', 'Style'],
  },
  {
    id: 4,
    category: 'Parenting',
    categoryColor: '#E8A020',
    title: 'Sleep schedules: what to expect in the first year',
    excerpt: 'A reassuring, expert-backed guide to your baby\'s sleep patterns — from newborn cat naps to longer stretches at six months.',
    author: 'Laura Jennings',
    authorRole: 'Sleep Consultant',
    date: '9 April 2025',
    readTime: '6 min read',
    imgColor: '#FAEACA',
    imgAccent: '#E8A020',
    imgIcon: 'moon',
    tags: ['Sleep', 'Newborn'],
  },
  {
    id: 5,
    category: 'Sustainability',
    categoryColor: '#198669',
    title: 'Our commitment to greener packaging by 2026',
    excerpt: 'We\'re eliminating single-use plastic from all product packaging — here\'s what that means and how you can help.',
    author: 'James Wren',
    authorRole: 'Sustainability Lead',
    date: '3 April 2025',
    readTime: '3 min read',
    imgColor: '#D8EEE8',
    imgAccent: '#136b52',
    imgIcon: 'leaf',
    tags: ['Sustainability', 'Brand'],
  },
  {
    id: 6,
    category: 'Real Stories',
    categoryColor: '#C4574A',
    title: '"Our Airo has been everywhere with us"',
    excerpt: 'Bethany and Rob share how the Airo compact stroller made family adventures possible again — from weekend hikes to city breaks.',
    author: 'Bethany Mills',
    authorRole: 'M&P Parent',
    date: '28 March 2025',
    readTime: '5 min read',
    imgColor: '#FEE2E2',
    imgAccent: '#C4574A',
    imgIcon: 'heart',
    tags: ['Real Stories', 'Strollers'],
  },
  {
    id: 7,
    category: 'Feeding',
    categoryColor: '#175A7B',
    title: 'Starting solids: a calm, confident approach',
    excerpt: 'Baby-led weaning, purees, or a mix of both? We explore the options with a leading paediatric dietitian.',
    author: 'Claire Forsyth',
    authorRole: 'Paediatric Dietitian',
    date: '21 March 2025',
    readTime: '7 min read',
    imgColor: '#DFEBEB',
    imgAccent: '#175A7B',
    imgIcon: 'coffee',
    tags: ['Feeding', 'Weaning'],
  },
];

const CATEGORIES = ['All', 'Buying Guides', 'New Arrivals', 'Parenting', 'Style', 'Sustainability', 'Real Stories', 'Feeding'];

/* ─── Helpers ─── */
const Badge = ({ label, color }) => (
  <span style={{
    display: 'inline-block',
    padding: '3px 10px',
    borderRadius: 9999,
    background: color + '18',
    color: color,
    fontSize: 10,
    fontWeight: 700,
    letterSpacing: '.1em',
    textTransform: 'uppercase',
  }}>{label}</span>
);

const AuthorLine = ({ author, role, date, readTime, light }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
    <div style={{
      width: 30, height: 30, borderRadius: '50%',
      background: light ? 'rgba(255,255,255,.2)' : '#F8F8F8',
      border: light ? '1.5px solid rgba(255,255,255,.3)' : '1.5px solid #D1D1D1',
      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
    }}>
      <i data-lucide="user" style={{ width: 13, height: 13, stroke: light ? 'rgba(255,255,255,.8)' : '#878686', strokeWidth: 1.5, fill: 'none' }}></i>
    </div>
    <div>
      <div style={{ fontSize: 12, fontWeight: 600, color: light ? '#fff' : '#323232', lineHeight: 1.3 }}>{author}</div>
      <div style={{ fontSize: 11, color: light ? 'rgba(255,255,255,.6)' : '#878686', display: 'flex', gap: 6, alignItems: 'center' }}>
        <span>{date}</span>
        <span style={{ opacity: .4 }}>·</span>
        <span>{readTime}</span>
      </div>
    </div>
  </div>
);

/* ─── Image placeholder ─── */
const PostImage = ({ post, style = {} }) => (
  <div style={{ background: post.imgColor, display: 'flex', alignItems: 'center', justifyContent: 'center', ...style }}>
    <i data-lucide={post.imgIcon} style={{ width: 40, height: 40, stroke: post.imgAccent, strokeWidth: 1, fill: 'none', opacity: .35 }}></i>
  </div>
);

/* ─── Featured Post ─── */
const FeaturedPost = ({ post }) => (
  <div className="featured-card" style={{ position: 'relative', background: '#323232', minHeight: 460 }}>
    {/* Background image area */}
    <div style={{ position: 'absolute', inset: 0, background: post.imgColor, opacity: .18 }}></div>
    <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <i data-lucide={post.imgIcon} style={{ width: 180, height: 180, stroke: post.imgAccent, strokeWidth: .5, fill: 'none', opacity: .15 }}></i>
    </div>

    {/* Gradient overlay */}
    <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(50,50,50,.95) 40%, rgba(50,50,50,.3) 100%)' }}></div>

    {/* Content */}
    <div style={{ position: 'relative', zIndex: 2, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', height: '100%', minHeight: 460, padding: '40px 48px' }}>
      <div style={{ maxWidth: 680 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
          <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: 'rgba(255,255,255,.5)' }}>FEATURED</span>
          <span style={{ width: 1, height: 12, background: 'rgba(255,255,255,.2)' }}></span>
          <Badge label={post.category} color={post.imgAccent} />
        </div>
        <h2 style={{ fontSize: 32, fontWeight: 700, color: '#fff', lineHeight: 1.2, marginBottom: 14, textWrap: 'pretty' }}>{post.title}</h2>
        <p style={{ fontSize: 15, color: 'rgba(255,255,255,.72)', lineHeight: 1.65, marginBottom: 28, maxWidth: 560 }}>{post.excerpt}</p>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16 }}>
          <AuthorLine author={post.author} role={post.authorRole} date={post.date} readTime={post.readTime} light={true} />
          <a href="#" className="read-more" style={{ color: post.imgAccent === '#198669' ? '#6DD5B2' : post.imgAccent }}>
            Read the full story
            <i data-lucide="arrow-right" style={{ width: 14, height: 14, stroke: 'currentColor', strokeWidth: 2, fill: 'none' }}></i>
          </a>
        </div>
      </div>
    </div>
  </div>
);

/* ─── Small Post Card ─── */
const PostCard = ({ post }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div className="post-card"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}>
      {/* Image zone */}
      <PostImage post={post} style={{ height: 180 }} />

      {/* Content */}
      <div style={{ padding: '20px 20px 24px', display: 'flex', flexDirection: 'column', gap: 10, flex: 1 }}>
        <Badge label={post.category} color={post.categoryColor} />
        <h3 style={{
          fontSize: 15, fontWeight: 700, color: '#323232', lineHeight: 1.35,
          textWrap: 'pretty', transition: 'color .15s',
          ...(hovered ? { color: '#198669' } : {}),
        }}>{post.title}</h3>
        <p style={{ fontSize: 12.5, color: '#878686', lineHeight: 1.6, flex: 1 }}>{post.excerpt}</p>
        <div style={{ borderTop: '1px solid #F8F8F8', paddingTop: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <AuthorLine author={post.author} date={post.date} readTime={post.readTime} />
          <a href="#" className="read-more">
            Read
            <i data-lucide="arrow-right" style={{ width: 12, height: 12, stroke: 'currentColor', strokeWidth: 2, fill: 'none' }}></i>
          </a>
        </div>
      </div>
    </div>
  );
};

/* ─── Wide Card (2-col span) ─── */
const WidePostCard = ({ post }) => {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div className="post-card" style={{ flexDirection: 'row', gridColumn: 'span 2' }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}>
      <PostImage post={post} style={{ width: 240, flexShrink: 0 }} />
      <div style={{ padding: '24px 28px', display: 'flex', flexDirection: 'column', gap: 10, flex: 1 }}>
        <Badge label={post.category} color={post.categoryColor} />
        <h3 style={{
          fontSize: 17, fontWeight: 700, color: '#323232', lineHeight: 1.3,
          textWrap: 'pretty', transition: 'color .15s',
          ...(hovered ? { color: '#198669' } : {}),
        }}>{post.title}</h3>
        <p style={{ fontSize: 13, color: '#878686', lineHeight: 1.65, flex: 1 }}>{post.excerpt}</p>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 4 }}>
          <AuthorLine author={post.author} date={post.date} readTime={post.readTime} />
          <a href="#" className="read-more">
            Read more
            <i data-lucide="arrow-right" style={{ width: 13, height: 13, stroke: 'currentColor', strokeWidth: 2, fill: 'none' }}></i>
          </a>
        </div>
      </div>
    </div>
  );
};

/* ─── Section Heading ─── */
const SectionHeading = ({ overline, title, cta }) => (
  <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 24 }}>
    <div>
      {overline && <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: '#198669', marginBottom: 6 }}>{overline}</div>}
      <h2 style={{ fontSize: 24, fontWeight: 700, color: '#323232' }}>{title}</h2>
    </div>
    {cta && <a href="#" style={{ fontSize: 13, fontWeight: 600, color: '#198669', textDecoration: 'none' }}>{cta} →</a>}
  </div>
);

/* ─── Newsletter Banner ─── */
const NewsletterBanner = () => (
  <div style={{
    borderRadius: 12, background: '#F8F6F0', border: '1px solid #D1D1D1',
    padding: '40px 48px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 32,
  }}>
    <div style={{ maxWidth: 440 }}>
      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: '#198669', marginBottom: 8 }}>The M&amp;P Journal</div>
      <h3 style={{ fontSize: 22, fontWeight: 700, color: '#323232', lineHeight: 1.3, marginBottom: 8 }}>Parenting insight, straight to your inbox</h3>
      <p style={{ fontSize: 13, color: '#878686', lineHeight: 1.65 }}>Expert guides, new arrival previews and real stories from M&amp;P families — delivered every fortnight.</p>
    </div>
    <div style={{ display: 'flex', gap: 10, flexShrink: 0, alignItems: 'center' }}>
      <input
        placeholder="Your email address"
        style={{
          padding: '11px 16px', background: '#fff', border: '1.5px solid #D1D1D1',
          borderRadius: 4, fontFamily: 'Poppins, sans-serif', fontSize: 13.5, color: '#323232',
          outline: 'none', width: 260,
        }}
      />
      <button style={{
        padding: '11px 24px', background: '#198669', color: '#fff',
        border: 'none', borderRadius: 4, fontFamily: 'Poppins, sans-serif',
        fontSize: 13.5, fontWeight: 600, cursor: 'pointer', whiteSpace: 'nowrap',
      }}>Subscribe</button>
    </div>
  </div>
);

/* ─── Main App ─── */
const App = () => {
  const [activeCategory, setActiveCategory] = React.useState('All');

  React.useEffect(() => { lucide.createIcons(); });

  const featured = POSTS[0];
  const gridPosts = POSTS.slice(1);

  const filteredGrid = activeCategory === 'All'
    ? gridPosts
    : gridPosts.filter(p => p.category === activeCategory);

  // Layout: first two posts span wide, then remainder in 3-col
  const widePosts = filteredGrid.slice(0, 1);
  const smallPosts = filteredGrid.slice(1);

  return (
    <div>
      <Header bagCount={0} />

      {/* Category nav */}
      <div style={{ background: '#fff', borderBottom: '1px solid #D1D1D1' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px', display: 'flex', gap: 8, overflowX: 'auto', paddingTop: 14, paddingBottom: 14, alignItems: 'center' }}>
          {CATEGORIES.map(cat => (
            <button key={cat}
              className={`cat-pill${activeCategory === cat ? ' active' : ''}`}
              onClick={() => setActiveCategory(cat)}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      {/* Page hero header */}
      <div style={{ background: '#fff', borderBottom: '1px solid #D1D1D1', padding: '32px 24px' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.15em', textTransform: 'uppercase', color: '#198669', marginBottom: 6 }}>The M&amp;P Journal</div>
          <h1 style={{ fontSize: 36, fontWeight: 700, color: '#323232', lineHeight: 1.2 }}>Stories for every stage</h1>
          <p style={{ fontSize: 14, color: '#878686', marginTop: 8, lineHeight: 1.6, maxWidth: 480 }}>Expert advice, real family stories, and inspiration for your parenting journey.</p>
        </div>
      </div>

      {/* Main content */}
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '40px 24px 64px' }}>

        {/* Featured post */}
        {activeCategory === 'All' && (
          <div style={{ marginBottom: 48 }}>
            <FeaturedPost post={featured} />
          </div>
        )}

        {/* Grid section heading */}
        <SectionHeading
          overline={activeCategory === 'All' ? 'Latest from the journal' : activeCategory}
          title={activeCategory === 'All' ? 'More to explore' : `${activeCategory} articles`}
          cta="View all"
        />

        {/* Wide card */}
        {widePosts.length > 0 && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20, marginBottom: 20 }}>
            <WidePostCard post={widePosts[0]} />
            {smallPosts.length > 0 && <PostCard post={smallPosts[0]} />}
          </div>
        )}

        {/* 3-col grid */}
        {smallPosts.length > 1 && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20, marginBottom: 48 }}>
            {smallPosts.slice(1).map(post => (
              <PostCard key={post.id} post={post} />
            ))}
          </div>
        )}

        {filteredGrid.length === 0 && (
          <div style={{ textAlign: 'center', padding: '64px 0', color: '#878686' }}>
            <i data-lucide="file-text" style={{ width: 32, height: 32, stroke: '#D1D1D1', strokeWidth: 1.5, fill: 'none', display: 'block', margin: '0 auto 12px' }}></i>
            <p style={{ fontSize: 14 }}>No articles in this category yet.</p>
          </div>
        )}

        {/* Newsletter */}
        <NewsletterBanner />
      </div>

      <Footer />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
